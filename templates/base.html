<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Exchange</title>
    <!-- Fonts: Playfair Display, Source Serif 4, JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <header class="site-header">
        <h1 class="website-logo">
            Book Exchange (logo placeholder)
        </h1>
        <nav class="site-nav">
            <a href="/">Index</a>
            <span class="nav-separator">|</span>
            <a href="/account">Account</a>
        </nav>
        <!-- User uses this navigation bar either to go to the home page or the my-account page. -->
    </header>

    <main>
        {% block content %}{% endblock %}

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>

</html>
